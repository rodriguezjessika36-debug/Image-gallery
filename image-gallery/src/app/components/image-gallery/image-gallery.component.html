<div class="gallery-container">
  @if (selectedIds().size > 0) {
    <div class="batch-bar sticky top-0 z-30 flex items-center justify-between gap-4 bg-blue-600 text-white rounded-lg px-4 py-3 mb-4 shadow-lg">
      <span class="font-medium">{{ selectedIds().size }} imagen(es) seleccionada(s)</span>
      <p-button
        icon="pi pi-trash"
        severity="danger"
        label="Eliminar seleccionadas"
        (click)="onDeleteSelected()"
      ></p-button>
    </div>
  }
  <div
    class="gallery-grid w-full grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 auto-rows-max"
    cdkDropList
    cdkDropListOrientation="mixed"
    (cdkDropListDropped)="onDrop($event)"
  >
    @for (image of images(); let idx = $index; track image.id) {
      @if (idx === 0) {
        <div class="col-span-1 md:col-span-2 md:row-span-2" cdkDrag>
          <app-image-item
            [image]="image"
            [destacada]="true"
            [selected]="selectedIds().has(image.id)"
            (deleteImage)="onDeleteImage($event)"
            (toggleSelect)="onToggleSelect($event)"
          ></app-image-item>
        </div>
      } @else {
        <div class="col-span-1" cdkDrag>
          <app-image-item
            [image]="image"
            [destacada]="false"
            [selected]="selectedIds().has(image.id)"
            (deleteImage)="onDeleteImage($event)"
            (toggleSelect)="onToggleSelect($event)"
          ></app-image-item>
        </div>
      }
    }
  </div>
</div>
