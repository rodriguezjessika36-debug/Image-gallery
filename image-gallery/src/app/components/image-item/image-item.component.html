<p-card
  [ngClass]="{ 'destacada': destacada(), 'selected': selected() }"
  class="h-full transition-all duration-300 ease-out"
>
  <ng-template pTemplate="header">
    <div class="relative overflow-hidden bg-gray-200" (click)="onToggleSelect($event)">
      @if (destacada()) {
        <div class="absolute top-3 right-3 z-10 bg-gradient-to-r from-yellow-400 to-yellow-300 text-gray-900 px-3 py-1 rounded-full text-xs font-bold shadow-lg">
          ⭐ Destacada
        </div>
      }
      <input
        type="checkbox"
        [checked]="selected()"
        (click)="onToggleSelect($event)"
        aria-label="Seleccionar imagen"
        class="absolute top-3 left-3 z-20 w-5 h-5 rounded cursor-pointer accent-blue-600"
      />
      @if (selected()) {
        <div class="absolute inset-0 z-10 bg-blue-500/30 flex items-center justify-center">
          <div class="bg-blue-600 text-white rounded-full p-2 shadow-lg">
            <i class="pi pi-check text-xl"></i>
          </div>
        </div>
      }
      <img
        [src]="image().src"
        [alt]="image().titulo + ' - ' + image().descripcion"
        class="w-full object-cover transition-transform duration-300 hover:scale-105"
        [class]="destacada() ? 'h-80' : 'h-48'"
      />
    </div>
  </ng-template>

  <div class="flex flex-col gap-4 ">
    <div>
      <h5 class="text-base font-semibold text-gray-900 mb-2">{{ image().titulo }}</h5>
      <p class="text-sm text-gray-600 mb-3">{{ image().descripcion }}</p>
      <p-tag 
        [value]="image().categoria"
        [severity]="destacada() ? 'warn' : 'secondary'"
      ></p-tag>
    </div>
    
    <div class="pt-3 border-t bg-[#cdabab]">
      <p-button
        icon="pi pi-trash"
        [outlined]="true"
        severity="danger"
        label="Eliminar"
        (click)="onDeleteClick($event)"
        pTooltip="Eliminar imagen"
        tooltipPosition="top"
        styleClass="w-full delete-btn"
      ></p-button>
    </div>
  </div>
</p-card>
