<div 
  class="h-full rounded-lg overflow-hidden cursor-pointer transition-all duration-300 ease-out"
  [class]="{
    'shadow-md hover:shadow-xl hover:-translate-y-1': !destacada(),
    'border-2 border-yellow-400 shadow-lg hover:shadow-2xl ring-2 ring-yellow-300 ring-opacity-50': destacada()
  }"
>
  <div class="relative h-full overflow-hidden bg-gray-200">
    @if (destacada()) {
      <div class="absolute top-3 right-3 z-10 bg-gradient-to-r from-yellow-400 to-yellow-300 text-gray-900 px-3 py-1 rounded-full text-xs font-bold shadow-lg">
        ⭐ Destacada
      </div>
    }
    <img 
      [src]="image().src" 
      [alt]="image().titulo + ' - ' + image().descripcion"
      class="w-full h-48 object-cover transition-transform duration-300 hover:scale-105"
      [class.h-80]="destacada()"
    />
  </div>
  <div class="p-3 bg-white">
    <h3 class="text-base font-semibold text-gray-900 mb-1">{{ image().titulo }}</h3>
    <p class="text-sm text-gray-600 mb-2">{{ image().descripcion }}</p>
    <span 
      class="inline-block px-2 py-1 rounded text-xs font-medium"
      [class]="destacada() ? 'bg-yellow-400 text-gray-900 font-semibold' : 'bg-gray-200 text-gray-700'"
    >
      {{ image().categoria }}
    </span>
  </div>
</div>
